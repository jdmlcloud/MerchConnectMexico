<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>
      MerchConnect México - Panel de Administración
    </title>
  </head>
  <body
    x-data="{
      page: 'dashboard', 
      loaded: true, 
      darkMode: false, 
      stickyMenu: false, 
      sidebarToggle: false, 
      scrollTop: false,
      organizations: [],
      loading: true,
      stats: {
        totalOrgs: 0,
        workshops: 0,
        providers: 0,
        activeOrgs: 0
      },
      apiUrl: 'https://ioar0odtg1.execute-api.us-east-1.amazonaws.com/v1'
    }"
    x-init="
      darkMode = JSON.parse(localStorage.getItem('darkMode'));
      $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)));
      loadOrganizations();
    "
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <div x-show="loading" class="fixed inset-0 z-9999 flex items-center justify-center bg-white dark:bg-gray-900">
      <div class="flex flex-col items-center gap-4">
        <div class="h-12 w-12 animate-spin rounded-full border-4 border-primary border-t-transparent"></div>
        <p class="text-gray-600 dark:text-gray-400">Cargando datos...</p>
      </div>
    </div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
      >
        <!-- Small Device Overlay Start -->
        <include src="./partials/overlay.html" />
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <include src="./partials/header.html" />
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="p-4 mx-auto max-w-7xl md:p-6">
            <!-- Breadcrumb -->
            <div class="mb-6">
              <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Dashboard</h1>
              <p class="text-gray-600 dark:text-gray-400">Panel de administración de MerchConnect México</p>
            </div>

            <div class="grid grid-cols-12 gap-4 md:gap-6">
              <!-- Estadísticas Principales -->
              <div class="col-span-12 grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-4">
                <!-- Total Organizaciones -->
                <div class="rounded-lg border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-gray-900">
                  <div class="flex items-center justify-between">
                    <div>
                      <p class="text-sm font-medium text-gray-600 dark:text-gray-400">Total Organizaciones</p>
                      <p class="text-2xl font-bold text-gray-900 dark:text-white" x-text="stats.totalOrgs">0</p>
                    </div>
                    <div class="flex h-12 w-12 items-center justify-center rounded-lg bg-blue-100 dark:bg-blue-900">
                      <svg class="h-6 w-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                      </svg>
                    </div>
                  </div>
                </div>

                <!-- Talleres -->
                <div class="rounded-lg border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-gray-900">
                  <div class="flex items-center justify-between">
                    <div>
                      <p class="text-sm font-medium text-gray-600 dark:text-gray-400">Talleres</p>
                      <p class="text-2xl font-bold text-gray-900 dark:text-white" x-text="stats.workshops">0</p>
                    </div>
                    <div class="flex h-12 w-12 items-center justify-center rounded-lg bg-green-100 dark:bg-green-900">
                      <svg class="h-6 w-6 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                      </svg>
                    </div>
                  </div>
                </div>

                <!-- Proveedores -->
                <div class="rounded-lg border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-gray-900">
                  <div class="flex items-center justify-between">
                    <div>
                      <p class="text-sm font-medium text-gray-600 dark:text-gray-400">Proveedores</p>
                      <p class="text-2xl font-bold text-gray-900 dark:text-white" x-text="stats.providers">0</p>
                    </div>
                    <div class="flex h-12 w-12 items-center justify-center rounded-lg bg-yellow-100 dark:bg-yellow-900">
                      <svg class="h-6 w-6 text-yellow-600 dark:text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                      </svg>
                    </div>
                  </div>
                </div>

                <!-- Organizaciones Activas -->
                <div class="rounded-lg border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-gray-900">
                  <div class="flex items-center justify-between">
                    <div>
                      <p class="text-sm font-medium text-gray-600 dark:text-gray-400">Activas</p>
                      <p class="text-2xl font-bold text-gray-900 dark:text-white" x-text="stats.activeOrgs">0</p>
                    </div>
                    <div class="flex h-12 w-12 items-center justify-center rounded-lg bg-purple-100 dark:bg-purple-900">
                      <svg class="h-6 w-6 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                      </svg>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Lista de Organizaciones -->
              <div class="col-span-12">
                <div class="rounded-lg border border-gray-200 bg-white dark:border-gray-800 dark:bg-gray-900">
                  <div class="border-b border-gray-200 px-6 py-4 dark:border-gray-800">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Organizaciones Recientes</h3>
                    <p class="text-sm text-gray-600 dark:text-gray-400">Lista de organizaciones registradas en el sistema</p>
                  </div>
                  
                  <div class="p-6">
                    <div x-show="organizations.length === 0 && !loading" class="text-center py-8">
                      <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                      </svg>
                      <h3 class="mt-2 text-sm font-medium text-gray-900 dark:text-white">No hay organizaciones</h3>
                      <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">No se encontraron organizaciones registradas.</p>
                    </div>

                    <div x-show="organizations.length > 0" class="space-y-4">
                      <template x-for="org in organizations" :key="org.pk">
                        <div class="flex items-center justify-between rounded-lg border border-gray-200 p-4 dark:border-gray-700">
                          <div class="flex items-center space-x-4">
                            <div class="flex h-10 w-10 items-center justify-center rounded-lg" 
                                 :class="org.gsi1pk.includes('workshop') ? 'bg-green-100 dark:bg-green-900' : 'bg-blue-100 dark:bg-blue-900'">
                              <svg class="h-5 w-5" 
                                   :class="org.gsi1pk.includes('workshop') ? 'text-green-600 dark:text-green-400' : 'text-blue-600 dark:text-blue-400'" 
                                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                              </svg>
                            </div>
                            <div>
                              <h4 class="text-sm font-medium text-gray-900 dark:text-white" x-text="org.name || org.orgSlug || 'Sin nombre'"></h4>
                              <p class="text-sm text-gray-500 dark:text-gray-400" x-text="org.gsi1pk.includes('workshop') ? 'Taller' : 'Proveedor'"></p>
                              <p class="text-xs text-gray-400 dark:text-gray-500" x-text="org.email"></p>
                            </div>
                          </div>
                          <div class="flex items-center space-x-2">
                            <span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium"
                                  :class="org.plan === 'pro' ? 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-300' : 
                                          org.plan === 'premium' ? 'bg-purple-100 text-purple-800 dark:bg-purple-900 dark:text-purple-300' : 
                                          'bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-300'"
                                  x-text="org.plan || 'free'"></span>
                            <span class="text-xs text-gray-500 dark:text-gray-400" x-text="new Date(org.createdAt).toLocaleDateString()"></span>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->

  </body>
</html>
