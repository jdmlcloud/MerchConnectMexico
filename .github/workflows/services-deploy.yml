name: Services Deploy

on:
  push:
    branches: [develop, sandbox, main]
    paths:
      - 'apps/services/**'
      - 'packages/**'
      - 'infra/cdk/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - branch: develop
            stage: dev
            role_arn: TODO_ROLE_ARN_DEV
          - branch: sandbox
            stage: sbx
            role_arn: TODO_ROLE_ARN_SBX
          - branch: main
            stage: prod
            role_arn: TODO_ROLE_ARN_PROD
    if: github.ref == format('refs/heads/{0}', matrix.branch)
    env:
      STAGE: ${{ matrix.stage }}
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build all
        run: pnpm -w build
      - name: CDK Deploy (update functions)
        run: STAGE=${{ env.STAGE }} pnpm -C infra/cdk deploy
