name: PNPM Test

on:
  push:
    branches: [sandbox]

jobs:
  test-pnpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm properly
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false  # ← asegura que no instale dependencias aquí

      - name: Check pnpm is available
        run: pnpm -v
