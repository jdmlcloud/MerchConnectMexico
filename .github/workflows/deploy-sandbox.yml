name: Deploy to Sandbox

on:
  push:
    branches: [sandbox]
  pull_request:
    branches: [sandbox]

env:
  AWS_REGION: us-east-1
  STAGE: sbx
  DOMAIN: sbx.merchconnectmexico.com
  API_DOMAIN: api-sbx.merchconnectmexico.com

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          always-auth: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm lint

      - name: Run type checking
        run: pnpm type-check

      - name: Build packages
        run: pnpm build:packages

      - name: Build web application
        run: pnpm build:web
        env:
          NEXT_PUBLIC_STAGE: sbx
          NEXT_PUBLIC_DOMAIN: sbx.merchconnectmexico.com
          NEXT_PUBLIC_API_URL: https://api-sbx.merchconnectmexico.com/v1

      - name: Build services
        run: pnpm build:services

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-sbx
          path: |
            apps/web/.next
            apps/services/dist
            packages/*/dist

  deploy:
    name: Deploy to Sandbox
    runs-on: ubuntu-24.04
    needs: test-and-build
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-sbx

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::209350187548:role/github-actions-role
          aws-region: us-east-1

      - name: Deploy Lambda functions
        run: |
          cd apps/services/pages
          zip -r function.zip .
          aws lambda update-function-code \
            --function-name mc-sbx-pages-worker \
            --zip-file fileb://function.zip

      - name: Deploy static assets to S3
        run: |
          aws s3 sync apps/web/.next/static s3://mc-sbx-public-209350187548/static/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 sync apps/web/public s3://mc-sbx-public-209350187548/ \
            --delete \
            --cache-control "public, max-age=31536000"

      - name: Invalidate CloudFront
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='MerchConnect sbx - CloudFront Distribution'].Id" \
            --output text)
          if [ "$DISTRIBUTION_ID" != "None" ] && [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths "/*"
            echo "CloudFront invalidation completed for distribution: $DISTRIBUTION_ID"
          else
            echo "No CloudFront distribution found for sandbox environment"
          fi

      - name: Verify deployment
        run: |
          echo "✅ Deployment to SANDBOX completed!"
          echo "🌐 URL: https://sbx.merchconnectmexico.com"
          echo "🔗 API: https://api-sbx.merchconnectmexico.com/v1"
