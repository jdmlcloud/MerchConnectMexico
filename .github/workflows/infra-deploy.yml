name: Infra Deploy

on:
  push:
    branches: [develop, sandbox, main]
    paths:
      - 'infra/cdk/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - branch: develop
            stage: dev
            role_arn: TODO_ROLE_ARN_DEV
          - branch: sandbox
            stage: sbx
            role_arn: TODO_ROLE_ARN_SBX
          - branch: main
            stage: prod
            role_arn: TODO_ROLE_ARN_PROD
    if: github.ref == format('refs/heads/{0}', matrix.branch)
    env:
      STAGE: ${{ matrix.stage }}
      AWS_REGION: us-east-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm -w build

      - name: Build CDK app
        run: pnpm -C infra/cdk build

      - name: CDK Synth
        run: STAGE=${{ env.STAGE }} pnpm -C infra/cdk synth

      - name: CDK Deploy (all stacks)
        run: STAGE=${{ env.STAGE }} pnpm -C infra/cdk deploy
